{% extends "base.html" %}

{% block title %}Courses{% endblock %}

{% block body %}
    <h2>Courses</h2>

    <h3>Add Course</h3>
    <form class="add-form" action="{{ url_for('add_course') }}" method="POST">
        <label>Course Name:</label>
        <input type="text" name="course_name" required>

        <label>Credits:</label>
        <input type="number" name="credits" min="1" required>

        <button class="btn" type="submit">Add Course</button>
    </form>

    <h3>Course List</h3>
    <table>
        <tr>
            <th>ID</th>
            <th>Course Name</th>
            <th>Credits</th>
            <th>Action</th>
        </tr>

        {% for course in courses %}
        <tr>
            <form action="{{ url_for('update_course', id=course.id) }}" method="POST">
                <td>{{ course.id }}</td>
                <td>
                    <input type="text" name="course_name" value="{{ course.course_name }}" required>
                </td>
                <td>
                    <input type="number" name="credits" value="{{ course.credits }}" min="1" required>
                </td>
                <td>
                    <button class="btn small-btn" type="submit">Update</button>
                    <a class="delete-link" href="{{ url_for('delete_course', id=course.id) }}">Delete</a>
                </td>
            </form>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
