{% extends "base.html" %}

{% block title %}Students{% endblock %}

{% block body %}
    <h2>Students</h2>

    <h3>Add Student</h3>
    <form class="add-form" action="{{ url_for('add_student') }}" method="POST">
        <label>Name:</label>
        <input type="text" name="name" required>

        <label>Course ID:</label>
        <select name="course_id" required>
            <option value="">Select Course</option>
            {% for course in courses %}
                <option value="{{ course.id }}">{{ course.id }} - {{ course.course_name }}</option>
            {% endfor %}
        </select>

        <label>Email:</label>
        <input type="email" name="email" required>

        <button class="btn" type="submit">Add Student</button>
    </form>

    <h3>Student List</h3>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course ID</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        {% for student in students %}
        <tr>
            <form action="{{ url_for('update_student', id=student.id) }}" method="POST">
                <td>{{ student.id }}</td>
                <td>
                    <input type="text" name="name" value="{{ student.name }}" required>
                </td>
                <td>
                    <select name="course_id" required>
                        {% for course in courses %}
                            <option value="{{ course.id }}" {% if student.course_id == course.id %}selected{% endif %}>
                                {{ course.id }}
                            </option>
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <input type="email" name="email" value="{{ student.email }}" required>
                </td>
                <td>
                    <button class="btn small-btn" type="submit">Update</button>
                    <a class="delete-link" href="{{ url_for('delete_student', id=student.id) }}">Delete</a>
                </td>
            </form>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
