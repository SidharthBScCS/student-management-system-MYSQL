<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Faculty Management</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">University Management</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/faculty">Faculty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/course">Course</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/department">Department</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/library">Library</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Faculty Management</h2>

    <button class="btn btn-primary mb-4"
            data-bs-toggle="modal"
            data-bs-target="#addFacultyModal">
        Add New Faculty
    </button>

    <div class="card shadow">
        <div class="card-body">

            <h4 class="mb-3">Faculty List</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Qualification</th>
                            <th>Experience</th>
                            <th>State</th>
                            <th>Country</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="faculty : ${faculties}">
                            <td th:text="${faculty.id}"></td>
                            <td th:text="${faculty.name}"></td>
                            <td th:text="${faculty.department}"></td>
                            <td th:text="${faculty.designation}"></td>
                            <td th:text="${faculty.phone}"></td>
                            <td th:text="${faculty.email}"></td>
                            <td th:text="${faculty.qualification}"></td>
                            <td th:text="${faculty.experience}"></td>
                            <td th:text="${faculty.state}"></td>
                            <td th:text="${faculty.country}"></td>

                            <td>
                                <button
                                    type="button"
                                    class="btn btn-warning btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#updateFacultyModal"
                                    th:attr="
                                        data-id=${faculty.id},
                                        data-name=${faculty.name},
                                        data-department=${faculty.department},
                                        data-designation=${faculty.designation},
                                        data-phone=${faculty.phone},
                                        data-email=${faculty.email},
                                        data-qualification=${faculty.qualification},
                                        data-experience=${faculty.experience},
                                        data-state=${faculty.state},
                                        data-country=${faculty.country}"
                                    onclick="setFacultyData(this)">
                                    Update
                                </button>

                                <a
                                    th:href="@{/faculty/delete/{id}(id=${faculty.id})}"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this faculty?')">
                                    Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<div class="modal fade" id="addFacultyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form action="/faculty" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Add Faculty</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>
                    <input type="text" name="department" class="form-control mb-3" placeholder="Department" required>
                    <input type="text" name="designation" class="form-control mb-3" placeholder="Designation" required>
                    <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
                    <input type="text" name="qualification" class="form-control mb-3" placeholder="Qualification">
                    <input type="text" name="experience" class="form-control mb-3" placeholder="Experience">
                    <input type="text" name="state" class="form-control mb-3" placeholder="State">
                    <input type="text" name="country" class="form-control mb-3" placeholder="Country">

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">
                        Save Faculty
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<div class="modal fade" id="updateFacultyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form id="updateFacultyForm" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Update Faculty</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input id="fName" type="text" name="name" class="form-control mb-3" required>
                    <input id="fDepartment" type="text" name="department" class="form-control mb-3" required>
                    <input id="fDesignation" type="text" name="designation" class="form-control mb-3" required>
                    <input id="fPhone" type="text" name="phone" class="form-control mb-3" required>
                    <input id="fEmail" type="email" name="email" class="form-control mb-3" required>
                    <input id="fQualification" type="text" name="qualification" class="form-control mb-3">
                    <input id="fExperience" type="text" name="experience" class="form-control mb-3">
                    <input id="fState" type="text" name="state" class="form-control mb-3">
                    <input id="fCountry" type="text" name="country" class="form-control mb-3">

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-warning">
                        Update Faculty
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
function setFacultyData(button) {
    let id = button.getAttribute("data-id");

    document.getElementById("fName").value = button.getAttribute("data-name");
    document.getElementById("fDepartment").value = button.getAttribute("data-department");
    document.getElementById("fDesignation").value = button.getAttribute("data-designation");
    document.getElementById("fPhone").value = button.getAttribute("data-phone");
    document.getElementById("fEmail").value = button.getAttribute("data-email");
    document.getElementById("fQualification").value = button.getAttribute("data-qualification");
    document.getElementById("fExperience").value = button.getAttribute("data-experience");
    document.getElementById("fState").value = button.getAttribute("data-state");
    document.getElementById("fCountry").value = button.getAttribute("data-country");

    document.getElementById("updateFacultyForm").action =
        "/faculty/update/" + id;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
