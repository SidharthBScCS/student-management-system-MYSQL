<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">University Management</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/faculty">Faculty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/course">Course</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/department">Department</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/library">Library</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/joins">Joins</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Library Management</h2>

    <button class="btn btn-primary mb-4"
            data-bs-toggle="modal"
            data-bs-target="#addLibraryModal">
        Add New Book
    </button>

    <div class="card shadow">
        <div class="card-body">

            <h4 class="mb-3">Library Book List</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Book Name</th>
                            <th>Book Code</th>
                            <th>Author Name</th>
                            <th>Publisher</th>
                            <th>Category</th>
                            <th>Language</th>
                            <th>Quantity</th>
                            <th>Rack Number</th>
                            <th>Floor Number</th>
                            <th>Availability Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="library : ${libraries}">
                            <td th:text="${library.id}"></td>
                            <td th:text="${library.bookName}"></td>
                            <td th:text="${library.bookCode}"></td>
                            <td th:text="${library.authorName}"></td>
                            <td th:text="${library.publisher}"></td>
                            <td th:text="${library.category}"></td>
                            <td th:text="${library.language}"></td>
                            <td th:text="${library.quantity}"></td>
                            <td th:text="${library.rackNumber}"></td>
                            <td th:text="${library.floorNumber}"></td>
                            <td th:text="${library.availabilityStatus}"></td>

                            <td>
                                <button
                                    type="button"
                                    class="btn btn-warning btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#updateLibraryModal"
                                    th:attr="
                                        data-id=${library.id},
                                        data-bookName=${library.bookName},
                                        data-bookCode=${library.bookCode},
                                        data-authorName=${library.authorName},
                                        data-publisher=${library.publisher},
                                        data-category=${library.category},
                                        data-language=${library.language},
                                        data-quantity=${library.quantity},
                                        data-rackNumber=${library.rackNumber},
                                        data-floorNumber=${library.floorNumber},
                                        data-availabilityStatus=${library.availabilityStatus}"
                                    onclick="setLibraryData(this)">
                                    Update
                                </button>

                                <a
                                    th:href="@{/library/delete/{id}(id=${library.id})}"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this book?')">
                                    Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<div class="modal fade" id="addLibraryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form action="/library" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Add Book</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input type="text" name="bookName" class="form-control mb-3" placeholder="Book Name" required>
                    <input type="text" name="bookCode" class="form-control mb-3" placeholder="Book Code" required>
                    <input type="text" name="authorName" class="form-control mb-3" placeholder="Author Name" required>
                    <input type="text" name="publisher" class="form-control mb-3" placeholder="Publisher" required>
                    <input type="text" name="category" class="form-control mb-3" placeholder="Category" required>
                    <input type="text" name="language" class="form-control mb-3" placeholder="Language" required>
                    <input type="number" name="quantity" class="form-control mb-3" placeholder="Quantity" required>
                    <input type="text" name="rackNumber" class="form-control mb-3" placeholder="Rack Number" required>
                    <input type="number" name="floorNumber" class="form-control mb-3" placeholder="Floor Number" required>
                    <input type="text" name="availabilityStatus" class="form-control mb-3" placeholder="Availability Status" required>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">
                        Save Book
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<div class="modal fade" id="updateLibraryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form id="updateLibraryForm" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Update Book</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input id="bName" type="text" name="bookName" class="form-control mb-3" required>
                    <input id="bCode" type="text" name="bookCode" class="form-control mb-3" required>
                    <input id="bAuthor" type="text" name="authorName" class="form-control mb-3" required>
                    <input id="bPublisher" type="text" name="publisher" class="form-control mb-3" required>
                    <input id="bCategory" type="text" name="category" class="form-control mb-3" required>
                    <input id="bLanguage" type="text" name="language" class="form-control mb-3" required>
                    <input id="bQuantity" type="number" name="quantity" class="form-control mb-3" required>
                    <input id="bRack" type="text" name="rackNumber" class="form-control mb-3" required>
                    <input id="bFloor" type="number" name="floorNumber" class="form-control mb-3" required>
                    <input id="bStatus" type="text" name="availabilityStatus" class="form-control mb-3" required>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-warning">
                        Update Book
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
function setLibraryData(button) {
    let id = button.getAttribute("data-id");

    document.getElementById("bName").value = button.getAttribute("data-bookName");
    document.getElementById("bCode").value = button.getAttribute("data-bookCode");
    document.getElementById("bAuthor").value = button.getAttribute("data-authorName");
    document.getElementById("bPublisher").value = button.getAttribute("data-publisher");
    document.getElementById("bCategory").value = button.getAttribute("data-category");
    document.getElementById("bLanguage").value = button.getAttribute("data-language");
    document.getElementById("bQuantity").value = button.getAttribute("data-quantity");
    document.getElementById("bRack").value = button.getAttribute("data-rackNumber");
    document.getElementById("bFloor").value = button.getAttribute("data-floorNumber");
    document.getElementById("bStatus").value = button.getAttribute("data-availabilityStatus");

    document.getElementById("updateLibraryForm").action =
        "/library/update/" + id;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
