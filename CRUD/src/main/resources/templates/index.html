<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="mb-4">Student Management System</h1>

        <!-- Add Student Button -->
        <button
            type="button"
            class="btn btn-primary mb-4"
            data-bs-toggle="modal"
            data-bs-target="#studentModal">
            Add New Student
        </button>

        <!-- Student Table -->
        <div class="card shadow">
            <div class="card-body">

                <h4 class="mb-3">Student List</h4>

                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Batch</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        <!-- Dynamic Data from Database -->
                        <tr th:each="student : ${students}">
                            <td th:text="${student.id}"></td>
                            <td th:text="${student.name}"></td>
                            <td th:text="${student.course}"></td>
                            <td th:text="${student.batch}"></td>
                            <td th:text="${student.email}"></td>
                            <td th:text="${student.phone}"></td>

                            <td>
                                <button class="btn btn-warning btn-sm">
                                    Update
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    Delete
                                </button>
                            </td>
                        </tr>

                    </tbody>
                </table>

            </div>
        </div>

        <!-- Bootstrap Modal -->
        <div class="modal fade" id="studentModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">

                    <!-- Modal Header -->
                    <div class="modal-header">
                        <h5 class="modal-title">Add Student</h5>

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                        </button>
                    </div>

                    <!-- Modal Body -->
                    <div class="modal-body">

                        <form action="/student" method="post">

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="name"
                                    class="form-control"
                                    placeholder="Name"
                                    required>
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="course"
                                    class="form-control"
                                    placeholder="Course"
                                    required>
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="batch"
                                    class="form-control"
                                    placeholder="Batch"
                                    required>
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control"
                                    placeholder="Phone"
                                    required>
                            </div>

                            <div class="mb-3">
                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="Email"
                                    required>
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="fatherName"
                                    class="form-control"
                                    placeholder="Father Name">
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="motherName"
                                    class="form-control"
                                    placeholder="Mother Name">
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="state"
                                    class="form-control"
                                    placeholder="State">
                            </div>

                            <div class="mb-3">
                                <input
                                    type="text"
                                    name="country"
                                    class="form-control"
                                    placeholder="Country">
                            </div>

                            <button
                                type="submit"
                                class="btn btn-success w-100">
                                Save Student
                            </button>

                        </form>

                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
