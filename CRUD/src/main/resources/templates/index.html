<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">University Management</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/faculty">Faculty</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/course">Course</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/department">Department</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/library">Library</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Student Management System</h2>

    <button class="btn btn-primary mb-4"
            data-bs-toggle="modal"
            data-bs-target="#addStudentModal">
        Add New Student
    </button>

    <div class="card shadow">
        <div class="card-body">

            <h4 class="mb-3">Student List</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Batch</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Father Name</th>
                            <th>Mother Name</th>
                            <th>State</th>
                            <th>Country</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="student : ${students}">
                            <td th:text="${student.id}"></td>
                            <td th:text="${student.name}"></td>
                            <td th:text="${student.course}"></td>
                            <td th:text="${student.batch}"></td>
                            <td th:text="${student.phone}"></td>
                            <td th:text="${student.email}"></td>
                            <td th:text="${student.fatherName}"></td>
                            <td th:text="${student.motherName}"></td>
                            <td th:text="${student.state}"></td>
                            <td th:text="${student.country}"></td>

                            <td>
                                <button
                                    type="button"
                                    class="btn btn-warning btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#updateStudentModal"
                                    th:attr="
                                        data-id=${student.id},
                                        data-name=${student.name},
                                        data-course=${student.course},
                                        data-batch=${student.batch},
                                        data-phone=${student.phone},
                                        data-email=${student.email},
                                        data-father=${student.fatherName},
                                        data-mother=${student.motherName},
                                        data-state=${student.state},
                                        data-country=${student.country}"
                                    onclick="setStudentData(this)">
                                    Update
                                </button>

                                <a
                                    th:href="@{/student/delete/{id}(id=${student.id})}"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this student?')">
                                    Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<div class="modal fade" id="addStudentModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form action="/student" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Add Student</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>
                    <input type="text" name="course" class="form-control mb-3" placeholder="Course" required>
                    <input type="text" name="batch" class="form-control mb-3" placeholder="Batch" required>
                    <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
                    <input type="text" name="fatherName" class="form-control mb-3" placeholder="Father Name">
                    <input type="text" name="motherName" class="form-control mb-3" placeholder="Mother Name">
                    <input type="text" name="state" class="form-control mb-3" placeholder="State">
                    <input type="text" name="country" class="form-control mb-3" placeholder="Country">

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">
                        Save Student
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<div class="modal fade" id="updateStudentModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form id="updateStudentForm" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Update Student</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input id="uName" type="text" name="name" class="form-control mb-3" required>
                    <input id="uCourse" type="text" name="course" class="form-control mb-3" required>
                    <input id="uBatch" type="text" name="batch" class="form-control mb-3" required>
                    <input id="uPhone" type="text" name="phone" class="form-control mb-3" required>
                    <input id="uEmail" type="email" name="email" class="form-control mb-3" required>
                    <input id="uFather" type="text" name="fatherName" class="form-control mb-3">
                    <input id="uMother" type="text" name="motherName" class="form-control mb-3">
                    <input id="uState" type="text" name="state" class="form-control mb-3">
                    <input id="uCountry" type="text" name="country" class="form-control mb-3">

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-warning">
                        Update Student
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
function setStudentData(button) {
    let id = button.getAttribute("data-id");

    document.getElementById("uName").value = button.getAttribute("data-name");
    document.getElementById("uCourse").value = button.getAttribute("data-course");
    document.getElementById("uBatch").value = button.getAttribute("data-batch");
    document.getElementById("uPhone").value = button.getAttribute("data-phone");
    document.getElementById("uEmail").value = button.getAttribute("data-email");
    document.getElementById("uFather").value = button.getAttribute("data-father");
    document.getElementById("uMother").value = button.getAttribute("data-mother");
    document.getElementById("uState").value = button.getAttribute("data-state");
    document.getElementById("uCountry").value = button.getAttribute("data-country");

    document.getElementById("updateStudentForm").action =
        "/student/update/" + id;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
