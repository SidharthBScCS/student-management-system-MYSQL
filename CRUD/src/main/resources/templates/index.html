<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">Student Management System</h1>

    <button
        type="button"
        class="btn btn-primary mb-4"
        data-bs-toggle="modal"
        data-bs-target="#studentModal">
        Add New Student
    </button>

    <div class="card shadow">
        <div class="card-body">

            <h4 class="mb-3">Student List</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Batch</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Father Name</th>
                            <th>Mother Name</th>
                            <th>State</th>
                            <th>Country</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="student : ${students}">
                            <td th:text="${student.id}"></td>
                            <td th:text="${student.name}"></td>
                            <td th:text="${student.course}"></td>
                            <td th:text="${student.batch}"></td>
                            <td th:text="${student.email}"></td>
                            <td th:text="${student.phone}"></td>
                            <td th:text="${student.fatherName}"></td>
                            <td th:text="${student.motherName}"></td>
                            <td th:text="${student.state}"></td>
                            <td th:text="${student.country}"></td>

                            <td>
                                <button
                                    type="button"
                                    class="btn btn-warning btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#updateModal"
                                    th:attr="
                                        data-id=${student.id},
                                        data-name=${student.name},
                                        data-course=${student.course},
                                        data-batch=${student.batch},
                                        data-phone=${student.phone},
                                        data-email=${student.email},
                                        data-father=${student.fatherName},
                                        data-mother=${student.motherName},
                                        data-state=${student.state},
                                        data-country=${student.country}"
                                    onclick="setUpdateData(this)">
                                    Update
                                </button>

                                <a
                                    th:href="@{/student/delete/{id}(id=${student.id})}"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this student?')">
                                    Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Student</h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <form action="/student" method="post">

                        <div class="mb-3">
                            <input type="text" name="name" class="form-control" placeholder="Name" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="course" class="form-control" placeholder="Course" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="batch" class="form-control" placeholder="Batch" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="phone" class="form-control" placeholder="Phone" required>
                        </div>

                        <div class="mb-3">
                            <input type="email" name="email" class="form-control" placeholder="Email" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="fatherName" class="form-control" placeholder="Father Name">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="motherName" class="form-control" placeholder="Mother Name">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="state" class="form-control" placeholder="State">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="country" class="form-control" placeholder="Country">
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Save Student
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Update Student</h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <form id="updateForm" method="post">

                        <div class="mb-3">
                            <input type="text" id="updateName" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updateCourse" name="course" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updateBatch" name="batch" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updatePhone" name="phone" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <input type="email" id="updateEmail" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updateFather" name="fatherName" class="form-control">
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updateMother" name="motherName" class="form-control">
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updateState" name="state" class="form-control">
                        </div>

                        <div class="mb-3">
                            <input type="text" id="updateCountry" name="country" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Update Student
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function setUpdateData(button) {
    let id = button.getAttribute("data-id");

    document.getElementById("updateName").value = button.getAttribute("data-name");
    document.getElementById("updateCourse").value = button.getAttribute("data-course");
    document.getElementById("updateBatch").value = button.getAttribute("data-batch");
    document.getElementById("updatePhone").value = button.getAttribute("data-phone");
    document.getElementById("updateEmail").value = button.getAttribute("data-email");
    document.getElementById("updateFather").value = button.getAttribute("data-father");
    document.getElementById("updateMother").value = button.getAttribute("data-mother");
    document.getElementById("updateState").value = button.getAttribute("data-state");
    document.getElementById("updateCountry").value = button.getAttribute("data-country");

    document.getElementById("updateForm").action = "/student/update/" + id;
}
</script>

</body>
</html>
