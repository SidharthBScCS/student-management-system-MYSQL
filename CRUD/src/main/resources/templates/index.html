<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">Student Management System</h1>

    <!-- Button trigger modal -->
    <button 
        type="button" 
        class="btn btn-primary"
        data-bs-toggle="modal" 
        data-bs-target="#studentModal">
        Add New Student
    </button>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <!-- Modal Header -->
                <div class="modal-header">
                    <h5 class="modal-title" id="studentModalLabel">Add Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Modal Body -->
                <div class="modal-body">

                    <form action="/student" method="post">

                        <div class="mb-3">
                            <input type="text" name="name" class="form-control" placeholder="Name" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="course" class="form-control" placeholder="Course" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="batch" class="form-control" placeholder="Batch" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="phone" class="form-control" placeholder="Phone" required>
                        </div>

                        <div class="mb-3">
                            <input type="email" name="email" class="form-control" placeholder="Email" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="fatherName" class="form-control" placeholder="Father Name">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="motherName" class="form-control" placeholder="Mother Name">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="state" class="form-control" placeholder="State">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="country" class="form-control" placeholder="Country">
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Save Student
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
